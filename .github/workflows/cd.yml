name: Backend CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-verify:
    name: Build & Verify Docker Image
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t smartspend-backend:${{ github.sha }} .

      - name: Smoke-test health endpoint
        run: |
          docker run -d --name test-backend \
            -e DATABASE_URL="postgresql://ci_user:ci_pass@localhost:5432/ci_db" \
            -e SECRET_KEY="${{ secrets.SECRET_KEY || 'ci-dummy-secret-key-32chars' }}" \
            -p 8000:8000 \
            smartspend-backend:${{ github.sha }}
          sleep 8
          curl -f http://localhost:8000/health
          docker stop test-backend

      - name: Tag as latest
        run: |
          docker tag smartspend-backend:${{ github.sha }} smartspend-backend:latest
          echo "Image ready: smartspend-backend:latest (${{ github.sha }})"
