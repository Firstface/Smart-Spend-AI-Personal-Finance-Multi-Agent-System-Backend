name: Backend CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-verify:
    name: Build & Verify Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t smartspend-backend:${{ github.sha }} .

      - name: Verify image was created
        run: |
          docker image inspect smartspend-backend:${{ github.sha }} \
            --format '{{.RepoTags}} size={{.Size}}'

      - name: Tag as latest
        run: |
          docker tag smartspend-backend:${{ github.sha }} smartspend-backend:latest
          echo "Image ready: smartspend-backend:latest (${{ github.sha }})"
