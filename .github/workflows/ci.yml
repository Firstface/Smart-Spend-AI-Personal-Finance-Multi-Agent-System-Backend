name: Backend CI

on:
  push:
    branches: [main, cicd-pipeline, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install flake8
      - run: flake8 .

  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: postgresql://ci_user:ci_pass@localhost:5432/ci_db
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      CHAT_EDUCATION_LLM_ROUTER: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt pytest pytest-asyncio
      - run: |
          pytest tests/test_quick_entry.py \
             tests/test_education_refusal.py \
                 tests/test_chat_intent.py \
                 tests/test_insights.py \
                 -v --tb=short
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results.xml
          if-no-files-found: ignore

  security-scan:
    name: Security Scan (Trivy + Bandit)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -r . -x ./tests,./venv,./.venv -ll

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t smartspend-backend:${{ github.sha }} .
